services:
  assistant:
    build: .
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_DEBUG: "false"
      TELEGRAM_ENABLED: "${TELEGRAM_ENABLED:-false}"
    volumes:
      - chroma_data:/app/data/chroma_db
      - documents_data:/app/data/documents
      - uploads_data:/app/data/uploads
    restart: unless-stopped

volumes:
  chroma_data:
  documents_data:
  uploads_data:
